# fly.toml app configuration file generated for adventure-9kxwlw on 2026-02-08T16:21:29Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'adventure-9kxwlw'
primary_region = 'lax'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  interval = "15s"
  timeout = "2s"
  grace_period = "10s"
  method = "GET"
  path = "/healthz"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
