# fly.toml app configuration file generated for adventure-q-su on 2026-07-01T01:19:46Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'adventure-q-su'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
